<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E60012;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b80a2f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Brand name top-left -->
  <text x="50" y="80" font-family="'Noto Sans JP', sans-serif" font-size="48" font-weight="900" fill="white">
    アフィトク！
  </text>

  <!-- Main headline -->
  <text x="600" y="200" font-family="'Noto Sans JP', sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle">
    Netflix
  </text>
  <text x="600" y="270" font-family="'Noto Sans JP', sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle">
    実質最安視聴プラン
  </text>

  <!-- Big number -->
  <text x="600" y="380" font-family="'Noto Sans JP', sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle">
    -857円
  </text>

  <!-- Subheader -->
  <text x="600" y="460" font-family="'Noto Sans JP', sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">
    お釣りが出ます
  </text>

  <!-- Footer text -->
  <text x="600" y="570" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="500" fill="white" text-anchor="middle" opacity="0.9">
    えんためねっと ＋ ドコモ爆アゲセレクション
  </text>
</svg>
